<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faça sua Rotina agora mesmo</title>
</head>
<body>
    <!--Parte superior do site-->
    <header>
        <h1>Bem vindo(a) a sua jornada!</h1>
    </header>

    <main>
        <!--Aqui vou criar uns avisos-->
        <section>
            <h2>Para Login:</h2>
            <p>Acesse seu portal de desenvolvimento pessoal e continue de onde parou!</p>
            <h2>Para Cadastro:</h2>
            <p>Para novos usuários crie a sua conta para inicializar o controle sobre suas rotinas!</p>
        </section>

        <!--Aqui vou criar a box de login-->
        <section>
            <h1>Login</h1>
            <form >
                <label for="email">Email:</label>
                <input type="email" name="email" placeholder="Ex: joão@gmail.com"> <br>
                <label for="password">Senha:</label>
                <input type="password" name="password" placeholder="EX: joao_2026"> <br>
                <button type="submit">Login</button>
            </form>

        </section>
    </main>
    
</body>
</html>
